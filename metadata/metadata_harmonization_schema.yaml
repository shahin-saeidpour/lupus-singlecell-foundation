{
  "schema_version": "1.0",
  "allowed_unknown_values": ["TODO", "unclear"],
  "canonical_fields": {
    "patient_id": {
      "description": "Source-supported patient identifier used for leakage-free patient-level analysis.",
      "required": true,
      "allowed_missing": true,
      "source_priority": ["explicit patient_id", "explicit donor_id when manually approved", "TODO"],
      "harmonization_notes": "Do not infer from sample IDs, cell barcodes, titles, or file names."
    },
    "donor_id": {
      "description": "Source-supported donor identifier when separate from patient_id.",
      "required": true,
      "allowed_missing": true,
      "source_priority": ["explicit donor_id", "explicit subject_id", "TODO"],
      "harmonization_notes": "May support split-unit design only after manual verification."
    },
    "sample_id": {
      "description": "Source-supported biological sample identifier.",
      "required": true,
      "allowed_missing": true,
      "source_priority": ["explicit sample_id", "GEO sample accession after verification", "TODO"],
      "harmonization_notes": "Do not treat sample IDs as patient IDs without evidence."
    },
    "cell_id": {
      "description": "Unique cell identifier or barcode after approved data access.",
      "required": true,
      "allowed_missing": true,
      "source_priority": ["explicit cell_id", "source barcode after data access approval", "TODO"],
      "harmonization_notes": "Cell IDs are not valid split units for prediction."
    },
    "cohort_id": {
      "description": "Study, cohort, site, or collection identifier for cohort-aware validation.",
      "required": true,
      "allowed_missing": true,
      "source_priority": ["explicit cohort_id", "study accession", "collection_id", "TODO"],
      "harmonization_notes": "Cohort labels must preserve source provenance."
    },
    "batch_id": {
      "description": "Explicit technical or processing batch identifier.",
      "required": true,
      "allowed_missing": true,
      "source_priority": ["explicit batch_id", "library/preparation/run metadata", "TODO"],
      "harmonization_notes": "Do not infer from file order or accession suffix."
    },
    "dataset_id": {
      "description": "Stable dataset identifier such as GEO accession or CELLxGENE dataset ID.",
      "required": true,
      "allowed_missing": false,
      "source_priority": ["explicit dataset accession", "explicit dataset_id"],
      "harmonization_notes": "Required for every harmonized record."
    },
    "source_dataset": {
      "description": "Human-readable source dataset, collection, or study name.",
      "required": true,
      "allowed_missing": true,
      "source_priority": ["source title", "collection title", "project title", "TODO"],
      "harmonization_notes": "Must remain linked to dataset_id."
    },
    "source_database": {
      "description": "Origin database or repository.",
      "required": true,
      "allowed_missing": false,
      "source_priority": ["GEO", "CELLxGENE", "HCA"],
      "harmonization_notes": "Allowed values must identify the source repository."
    },
    "organism": {
      "description": "Organism label from source metadata.",
      "required": true,
      "allowed_missing": false,
      "source_priority": ["explicit organism", "ontology organism field"],
      "harmonization_notes": "Must be human for this project; do not infer from disease context."
    },
    "tissue": {
      "description": "Tissue or specimen source.",
      "required": true,
      "allowed_missing": true,
      "source_priority": ["explicit tissue", "organ ontology field", "TODO"],
      "harmonization_notes": "Do not infer lupus nephritis status from kidney tissue."
    },
    "assay_type": {
      "description": "Single-cell assay or platform.",
      "required": true,
      "allowed_missing": true,
      "source_priority": ["explicit assay_type", "library_strategy", "technology field", "TODO"],
      "harmonization_notes": "Assay labels must support single-cell verification before processing."
    },
    "disease_label": {
      "description": "Source-supported diagnosis or case/control label.",
      "required": true,
      "allowed_missing": false,
      "source_priority": ["explicit disease field", "source diagnosis label"],
      "harmonization_notes": "Do not infer from title, accession, or tissue."
    },
    "disease_activity": {
      "description": "Explicit disease activity value, category, flare/remission status, or score if present.",
      "required": false,
      "allowed_missing": true,
      "source_priority": ["explicit activity label", "explicit clinical score", "TODO"],
      "harmonization_notes": "Do not infer activity from diagnosis or treatment."
    },
    "cell_type": {
      "description": "Cell-type annotation label if source-provided or later generated by approved QC workflow.",
      "required": true,
      "allowed_missing": true,
      "source_priority": ["explicit cell_type annotation", "approved future annotation", "TODO"],
      "harmonization_notes": "Do not assume annotations from assay type or publication title."
    },
    "treatment_status": {
      "description": "Treatment exposure/status from explicit source metadata.",
      "required": false,
      "allowed_missing": true,
      "source_priority": ["explicit treatment field", "explicit medication exposure", "TODO"],
      "harmonization_notes": "Do not infer from disease severity, cohort label, or publication design."
    },
    "sex": {
      "description": "Source-supported participant sex metadata.",
      "required": false,
      "allowed_missing": true,
      "source_priority": ["explicit sex field", "TODO"],
      "harmonization_notes": "Do not infer from names or demographics summaries."
    },
    "age": {
      "description": "Source-supported age or age category.",
      "required": false,
      "allowed_missing": true,
      "source_priority": ["explicit age field", "explicit age category", "TODO"],
      "harmonization_notes": "Preserve units or category definition when available."
    },
    "timepoint": {
      "description": "Sample timepoint for repeated or longitudinal samples.",
      "required": false,
      "allowed_missing": true,
      "source_priority": ["explicit timepoint", "visit label", "TODO"],
      "harmonization_notes": "Do not infer longitudinal order from file order."
    },
    "split_group": {
      "description": "Future patient-level or cohort-level split assignment policy.",
      "required": true,
      "allowed_missing": true,
      "source_priority": ["approved future split manifest", "TODO"],
      "harmonization_notes": "Cell-level split assignment is forbidden."
    }
  }
}
